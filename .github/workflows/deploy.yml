name: Deploy to Itch.io

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/**'
      - '.deploy-trigger'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Check latest main
        id: freshness
        shell: bash
        run: |
          git fetch origin main
          latest="$(git rev-parse origin/main)"
          if [ "$latest" = "$GITHUB_SHA" ]; then
            echo "is_latest=true" >> "$GITHUB_OUTPUT"
            echo "Deploying latest main: $GITHUB_SHA"
          else
            echo "is_latest=false" >> "$GITHUB_OUTPUT"
            echo "Skipping stale commit $GITHUB_SHA because latest main is $latest"
          fi

      - name: Install Godot 4.7 and export templates
        if: steps.freshness.outputs.is_latest == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .ci/godot .ci/templates "$HOME/.local/share/godot/export_templates/4.7.stable"
          curl -fL https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_linux.x86_64.zip -o .ci/godot.zip
          unzip -q .ci/godot.zip -d .ci/godot
          chmod +x .ci/godot/Godot_v4.7-stable_linux.x86_64
          curl -fL https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_export_templates.tpz -o .ci/templates.tpz
          unzip -q .ci/templates.tpz -d .ci/templates
          cp -a .ci/templates/templates/. "$HOME/.local/share/godot/export_templates/4.7.stable/"

      - name: Validate versioned import cache
        if: steps.freshness.outputs.is_latest == 'true'
        shell: bash
        run: |
          set -euo pipefail
          test -d .godot/imported
          count="$(find .godot/imported -type f | wc -l)"
          test "$count" -gt 0
          echo "Using $count versioned Godot import artifacts"

      - name: Export and validate Godot Web build
        if: steps.freshness.outputs.is_latest == 'true'
        shell: bash
        env:
          GODOT_BIN: ${{ github.workspace }}/.ci/godot/Godot_v4.7-stable_linux.x86_64
        run: bash ./export_web.sh

      - name: Publish to itch.io
        if: steps.freshness.outputs.is_latest == 'true'
        uses: josephbmanley/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_API_KEY }}
          CHANNEL: web
          ITCH_GAME: ${{ secrets.ITCH_GAME_ID }}
          ITCH_USER: ${{ secrets.ITCH_USERNAME }}
          PACKAGE: build/web
