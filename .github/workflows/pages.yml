name: Deploy Web to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Remove local Godot AI tooling hooks
        shell: bash
        run: |
          set -euo pipefail
          # The Godot AI addon is local editor tooling and is intentionally
          # excluded from Git. Remove its project hooks only in this CI checkout.
          sed -i '/^_mcp_game_helper=.*addons\/godot_ai/d' project.godot
          sed -i 's#^enabled=PackedStringArray("res://addons/godot_ai/plugin.cfg")#enabled=PackedStringArray()#' project.godot

      - name: Install Godot 4.7 and export templates
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .ci/godot .ci/templates "$HOME/.local/share/godot/export_templates/4.7.stable"
          curl -fL https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_linux.x86_64.zip -o .ci/godot.zip
          unzip -q .ci/godot.zip -d .ci/godot
          chmod +x .ci/godot/Godot_v4.7-stable_linux.x86_64
          curl -fL https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_export_templates.tpz -o .ci/templates.tpz
          unzip -q .ci/templates.tpz -d .ci/templates
          cp -a .ci/templates/templates/. "$HOME/.local/share/godot/export_templates/4.7.stable/"

      - name: Rebuild Godot import cache
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .godot
          mkdir -p build/web

      - name: Import Godot project resources
        shell: bash
        env:
          GODOT_BIN: ${{ github.workspace }}/.ci/godot/Godot_v4.7-stable_linux.x86_64
        run: ${GODOT_BIN} --headless --editor --path . --script .ci/reimport_assets.gd

      - name: Verify required hero imports
        shell: bash
        run: |
          set -euo pipefail
          for hero in druid dwarf mech nerubian shaman undead_king; do
            if ! find .godot/imported -maxdepth 1 -type f -name "${hero}_idle_front.png-*.ctex" -print -quit | grep -q .; then
              echo "Missing generated import for ${hero}_idle_front.png" >&2
              exit 1
            fi
          done

      - name: Export and validate Godot Web build
        shell: bash
        env:
          GODOT_BIN: ${{ github.workspace }}/.ci/godot/Godot_v4.7-stable_linux.x86_64
        run: bash ./export_web.sh

      - name: Record deployed commit
        shell: bash
        run: printf '%s\n' "$GITHUB_SHA" > build/web/deploy-commit.txt

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/web

  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify live browser build
        shell: bash
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          set -euo pipefail
          expected="$GITHUB_SHA"
          verify_url="${PAGE_URL%/}/deploy-commit.txt?sha=${expected}"
          for attempt in $(seq 1 18); do
            actual="$(curl -fsSL -H 'Cache-Control: no-cache' "$verify_url" 2>/dev/null | tr -d '\r\n' || true)"
            if [[ "$actual" == "$expected" ]]; then
              echo "Verified live Pages deployment: $actual"
              printf '### Live deployment verified\n\n- URL: %s\n- Commit: `%s`\n' "$PAGE_URL" "$expected" >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            echo "Waiting for Pages propagation ($attempt/18): got '${actual:-no response}'"
            sleep 10
          done
          echo "Pages did not serve expected commit $expected from $verify_url" >&2
          exit 1
